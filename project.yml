name: Sweep

options:
  bundleIdPrefix: com.nikstar
  deploymentTarget:
    macOS: "15.0"
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SQLiteData:
    url: https://github.com/pointfreeco/sqlite-data
    from: "1.6.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_ENABLE_MODULES: YES
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

targets:
  SweepCore:
    type: framework
    platform: macOS
    sources:
      - Sources/SweepCore
    dependencies:
      - package: SQLiteData
        product: SQLiteData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep.core
        PRODUCT_NAME: SweepCore

  SweepRQBitBridge:
    type: framework
    platform: macOS
    sources:
      - Sources/SweepRQBitBridge
    dependencies:
      - target: SweepCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep.rqbitbridge
        PRODUCT_NAME: SweepRQBitBridge
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        OTHER_LDFLAGS: "$(inherited) -lsweep_rqbit"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @loader_path/../../.. @executable_path/../Frameworks"
      configs:
        Debug:
          LIBRARY_SEARCH_PATHS: "$(SRCROOT)/rust/target/debug"
        Release:
          LIBRARY_SEARCH_PATHS: "$(SRCROOT)/rust/target/release"
    preBuildScripts:
      - name: Build Rust rqbit Bridge
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          "${SRCROOT}/Scripts/build_rust_bridge.sh"

  Sweep:
    type: application
    platform: macOS
    sources:
      - Sources/SweepMac
    dependencies:
      - target: SweepCore
        embed: true
      - target: SweepRQBitBridge
        embed: true
    postBuildScripts:
      - name: Embed Rust rqbit Bridge
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          if [ "${CONFIGURATION}" = "Release" ]; then
            RUST_PROFILE="release"
          else
            RUST_PROFILE="debug"
          fi

          BRIDGE_PATH="${SRCROOT}/rust/target/${RUST_PROFILE}/libsweep_rqbit.dylib"
          DESTINATION="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}"

          mkdir -p "${DESTINATION}"
          cp "${BRIDGE_PATH}" "${DESTINATION}/libsweep_rqbit.dylib"

          if [ "${CODE_SIGNING_ALLOWED:-NO}" = "YES" ]; then
            SIGN_IDENTITY="${EXPANDED_CODE_SIGN_IDENTITY:-}"
            if [ -z "${SIGN_IDENTITY}" ]; then
              SIGN_IDENTITY="-"
            fi
            codesign --force --sign "${SIGN_IDENTITY}" "${DESTINATION}/libsweep_rqbit.dylib"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep
        PRODUCT_NAME: Sweep
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/SweepMac/Resources/Info.plist
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""

  SweepCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/SweepCoreTests
    dependencies:
      - target: SweepCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep.core.tests
        PRODUCT_NAME: SweepCoreTests

  SweepCore_iOS:
    type: framework
    platform: iOS
    sources:
      - Sources/SweepCore
    dependencies:
      - package: SQLiteData
        product: SQLiteData
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep.core.ios
        PRODUCT_NAME: SweepCore
        PRODUCT_MODULE_NAME: SweepCore

  SweepRQBitBridge_iOS:
    type: framework
    platform: iOS
    sources:
      - Sources/SweepRQBitBridge
    dependencies:
      - target: SweepCore_iOS
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nikstar.sweep.rqbitbridge.ios
        PRODUCT_NAME: SweepRQBitBridge
        PRODUCT_MODULE_NAME: SweepRQBitBridge
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        OTHER_LDFLAGS: "$(inherited) -framework Security -framework CoreFoundation -liconv"
      configs:
        Debug:
          LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]: "$(SRCROOT)/rust/target/aarch64-apple-ios-sim/debug"
          LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: "$(SRCROOT)/rust/target/aarch64-apple-ios/debug"
          OTHER_LDFLAGS[sdk=iphonesimulator*]: "$(inherited) $(SRCROOT)/rust/target/aarch64-apple-ios-sim/debug/libsweep_rqbit.a -framework Security -framework CoreFoundation -liconv"
          OTHER_LDFLAGS[sdk=iphoneos*]: "$(inherited) $(SRCROOT)/rust/target/aarch64-apple-ios/debug/libsweep_rqbit.a -framework Security -framework CoreFoundation -liconv"
        Release:
          LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]: "$(SRCROOT)/rust/target/aarch64-apple-ios-sim/release"
          LIBRARY_SEARCH_PATHS[sdk=iphoneos*]: "$(SRCROOT)/rust/target/aarch64-apple-ios/release"
          OTHER_LDFLAGS[sdk=iphonesimulator*]: "$(inherited) $(SRCROOT)/rust/target/aarch64-apple-ios-sim/release/libsweep_rqbit.a -framework Security -framework CoreFoundation -liconv"
          OTHER_LDFLAGS[sdk=iphoneos*]: "$(inherited) $(SRCROOT)/rust/target/aarch64-apple-ios/release/libsweep_rqbit.a -framework Security -framework CoreFoundation -liconv"
    preBuildScripts:
      - name: Build Rust rqbit Bridge
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          "${SRCROOT}/Scripts/build_rust_bridge.sh"

  Sweep_iOS:
    type: application
    platform: iOS
    sources:
      - Sources/SweepIOS
      - path: magnet.txt
        buildPhase: resources
    dependencies:
      - target: SweepCore_iOS
        embed: true
      - target: SweepRQBitBridge_iOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.nikstar.sweep.ios
        PRODUCT_NAME: Sweep
        INFOPLIST_KEY_CFBundleDisplayName: Sweep
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/SweepRQBitBridge/Generated"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: 6RX8GEVB43
        PROVISIONING_PROFILE_SPECIFIER: ""

schemes:
  Sweep:
    build:
      targets:
        Sweep: all
    test:
      targets:
        - SweepCoreTests
    run:
      config: Debug
      commandLineArguments:
        "-ApplePersistenceIgnoreState YES": true
  Sweep-iOS:
    build:
      targets:
        Sweep_iOS: all
    run:
      config: Debug
