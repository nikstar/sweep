name: Sweep

options:
  bundleIdPrefix: me.nikstar
  deploymentTarget:
    macOS: "15.0"
    iOS: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SweepPackage:
    path: .

settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_ENABLE_MODULES: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

aggregateTargets:
  SweepRustArtifacts:
    buildScripts:
      - name: Build Rust rqbit Bridge
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/Info.plist
          - $(SRCROOT)/Sources/SweepRQBitBridge/Generated/module.modulemap
          - $(SRCROOT)/Sources/SweepRQBitBridge/Generated/sweep_rqbit.swift
          - $(SRCROOT)/Sources/SweepRQBitBridge/Generated/sweep_rqbitFFI.h
          - $(SRCROOT)/Sources/SweepRustFFI/module.modulemap
          - $(SRCROOT)/Sources/SweepRustFFI/sweep_rqbitFFI.h
        script: |
          set -euo pipefail

          "${SRCROOT}/Scripts/build_rust_bridge.sh"

targets:
  Sweep:
    type: application
    platform: macOS
    sources:
      - Sources/SweepMac
    dependencies:
      - target: SweepRustArtifacts
      - package: SweepPackage
        product: SweepCore
        embed: false
      - package: SweepPackage
        product: SweepRQBitBridge
        embed: false
      - sdk: Security.framework
      - sdk: CoreFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.nikstar.sweep
        PRODUCT_NAME: Sweep
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/SweepMac/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: 6RX8GEVB43
        PROVISIONING_PROFILE_SPECIFIER: ""
        OTHER_LDFLAGS: "$(inherited) $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/macos-arm64_x86_64/libsweep_rqbit.a -liconv"

  SweepCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/SweepCoreTests
    dependencies:
      - package: SweepPackage
        product: SweepCore
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.nikstar.sweep.core.tests
        PRODUCT_NAME: SweepCoreTests

  Sweep_iOS:
    type: application
    platform: iOS
    sources:
      - Sources/SweepIOS
      - path: magnet.txt
        buildPhase: resources
    dependencies:
      - target: SweepRustArtifacts
      - package: SweepPackage
        product: SweepCore
        embed: false
      - package: SweepPackage
        product: SweepRQBitBridge
        embed: false
      - sdk: Security.framework
      - sdk: CoreFoundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.nikstar.sweep.ios
        PRODUCT_NAME: Sweep
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/SweepIOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ClassicAppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        DEVELOPMENT_TEAM: 6RX8GEVB43
        PROVISIONING_PROFILE_SPECIFIER: ""
      configs:
        Debug:
          OTHER_LDFLAGS[sdk=iphonesimulator*]: "$(inherited) $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/ios-arm64_x86_64-simulator/libsweep_rqbit.a -liconv"
          OTHER_LDFLAGS[sdk=iphoneos*]: "$(inherited) $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/ios-arm64/libsweep_rqbit.a -liconv"
        Release:
          OTHER_LDFLAGS[sdk=iphonesimulator*]: "$(inherited) $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/ios-arm64_x86_64-simulator/libsweep_rqbit.a -liconv"
          OTHER_LDFLAGS[sdk=iphoneos*]: "$(inherited) $(SRCROOT)/BuildArtifacts/SweepRustFFI.xcframework/ios-arm64/libsweep_rqbit.a -liconv"

schemes:
  Sweep:
    build:
      targets:
        Sweep: all
    test:
      targets:
        - SweepCoreTests
    run:
      config: Debug
      commandLineArguments:
        "-ApplePersistenceIgnoreState YES": true
  Sweep-iOS:
    build:
      targets:
        Sweep_iOS: all
    run:
      config: Debug
